# ============================================================
# TrueQA 小程序后端反代配置
# 放到 /etc/nginx/conf.d/trueqa.conf  （或 include 进主 nginx.conf 的 http 块）
# 注意：map 指令必须位于 http 上下文，conf.d 文件默认被包在 http 块内，没问题。
# ============================================================

# WebSocket 协商：普通 HTTP 请求 -> Connection close；WS 请求 -> Connection upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- 80 端口：强制跳 HTTPS ----
server {
    listen 80;
    server_name trueqa.shenhdou.asia;
    return 301 https://$host$request_uri;
}

# ---- 443 端口：HTTPS 反代到本地 Node 后端（:3000）----
server {
    listen 443 ssl;
    server_name trueqa.shenhdou.asia;

    ssl_certificate     /etc/ssl/certd/cert.crt;
    ssl_certificate_key /etc/ssl/certd/cert.key;

    # TLS 推荐配置（微信要求可信证书，certd 走 Let's Encrypt 自动续期即可）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 反代到本地后端。后端代码固定监听 3000（见 server/src/index.js: PORT=3000）
    location / {
        proxy_pass http://localhost:3000;

        # WebSocket 必需
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 透传真实信息给后端
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时：WS 是长连接，read/timeout 给足；普通 REST 很快
        proxy_connect_timeout 60s;
        proxy_send_timeout 18000s;
        proxy_read_timeout 18000s;

        # 小程序后端不存在大文件上传，10m 足够（原 20000m=20G 过于夸张，调小更安全）
        client_max_body_size 10m;
    }
}
